<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#0f1328"/>
    </linearGradient>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#059669" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Graph visualization (left side)                               -->
  <!-- Packing nodes (green): P1(90,150), P2(540,120), P3(90,530)   -->
  <!-- Gray nodes: A(200,240) B(330,170) C(440,280) D(310,400)      -->
  <!--             E(170,380) F(490,430) G(280,540) H(560,280) I(430,160) -->
  <!-- All packing node pairs have distance >= 4 (valid 2-packing)  -->

  <!-- Edges -->
  <g stroke="#4a5568" stroke-width="2.5" opacity="0.5">
    <line x1="90" y1="150" x2="200" y2="240"/>   <!-- P1-A -->
    <line x1="540" y1="120" x2="430" y2="160"/>   <!-- P2-I -->
    <line x1="90" y1="530" x2="280" y2="540"/>    <!-- P3-G -->
    <line x1="200" y1="240" x2="330" y2="170"/>   <!-- A-B -->
    <line x1="200" y1="240" x2="170" y2="380"/>   <!-- A-E -->
    <line x1="330" y1="170" x2="440" y2="280"/>   <!-- B-C -->
    <line x1="330" y1="170" x2="310" y2="400"/>   <!-- B-D -->
    <line x1="330" y1="170" x2="430" y2="160"/>   <!-- B-I -->
    <line x1="440" y1="280" x2="310" y2="400"/>   <!-- C-D -->
    <line x1="440" y1="280" x2="560" y2="280"/>   <!-- C-H -->
    <line x1="440" y1="280" x2="490" y2="430"/>   <!-- C-F -->
    <line x1="310" y1="400" x2="170" y2="380"/>   <!-- D-E -->
    <line x1="310" y1="400" x2="280" y2="540"/>   <!-- D-G -->
    <line x1="490" y1="430" x2="280" y2="540"/>   <!-- F-G -->
    <line x1="490" y1="430" x2="560" y2="280"/>   <!-- F-H -->
    <line x1="560" y1="280" x2="430" y2="160"/>   <!-- H-I -->
  </g>

  <!-- Distance-2 halos around packing nodes -->
  <circle cx="90" cy="150" r="90" fill="none" stroke="#059669" stroke-width="1" stroke-dasharray="4 3" opacity="0.15"/>
  <circle cx="540" cy="120" r="90" fill="none" stroke="#059669" stroke-width="1" stroke-dasharray="4 3" opacity="0.15"/>
  <circle cx="90" cy="530" r="90" fill="none" stroke="#059669" stroke-width="1" stroke-dasharray="4 3" opacity="0.15"/>

  <!-- Non-packing nodes (gray) with X marks -->

  <!-- A(200,240) -->
  <circle cx="200" cy="240" r="22" fill="#2a3040" stroke="#4a5568" stroke-width="2.5"/>
  <line x1="190" y1="230" x2="210" y2="250" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="210" y1="230" x2="190" y2="250" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- B(330,170) -->
  <circle cx="330" cy="170" r="22" fill="#2a3040" stroke="#4a5568" stroke-width="2.5"/>
  <line x1="320" y1="160" x2="340" y2="180" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="340" y1="160" x2="320" y2="180" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- C(440,280) -->
  <circle cx="440" cy="280" r="22" fill="#2a3040" stroke="#4a5568" stroke-width="2.5"/>
  <line x1="430" y1="270" x2="450" y2="290" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="450" y1="270" x2="430" y2="290" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- D(310,400) -->
  <circle cx="310" cy="400" r="22" fill="#2a3040" stroke="#4a5568" stroke-width="2.5"/>
  <line x1="300" y1="390" x2="320" y2="410" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="320" y1="390" x2="300" y2="410" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- E(170,380) -->
  <circle cx="170" cy="380" r="22" fill="#2a3040" stroke="#4a5568" stroke-width="2.5"/>
  <line x1="160" y1="370" x2="180" y2="390" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="180" y1="370" x2="160" y2="390" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- F(490,430) -->
  <circle cx="490" cy="430" r="22" fill="#2a3040" stroke="#4a5568" stroke-width="2.5"/>
  <line x1="480" y1="420" x2="500" y2="440" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="500" y1="420" x2="480" y2="440" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- G(280,540) -->
  <circle cx="280" cy="540" r="22" fill="#2a3040" stroke="#4a5568" stroke-width="2.5"/>
  <line x1="270" y1="530" x2="290" y2="550" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="290" y1="530" x2="270" y2="550" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- H(560,280) -->
  <circle cx="560" cy="280" r="22" fill="#2a3040" stroke="#4a5568" stroke-width="2.5"/>
  <line x1="550" y1="270" x2="570" y2="290" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="570" y1="270" x2="550" y2="290" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- I(430,160) -->
  <circle cx="430" cy="160" r="22" fill="#2a3040" stroke="#4a5568" stroke-width="2.5"/>
  <line x1="420" y1="150" x2="440" y2="170" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="440" y1="150" x2="420" y2="170" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Packing nodes (green) with checkmarks -->

  <!-- P1(90,150) -->
  <circle cx="90" cy="150" r="26" fill="#059669" stroke="#34d399" stroke-width="3" filter="url(#glow-green)"/>
  <polyline points="78,150 86,158 102,142" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- P2(540,120) -->
  <circle cx="540" cy="120" r="26" fill="#059669" stroke="#34d399" stroke-width="3" filter="url(#glow-green)"/>
  <polyline points="528,120 536,128 552,112" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- P3(90,530) -->
  <circle cx="90" cy="530" r="26" fill="#059669" stroke="#34d399" stroke-width="3" filter="url(#glow-green)"/>
  <polyline points="78,530 86,538 102,522" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "d > 2" annotations -->
  <text x="310" y="100" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#34d399" text-anchor="middle" opacity="0.5" font-style="italic">d &gt; 2</text>
  <text x="55" y="350" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#34d399" text-anchor="middle" opacity="0.5" font-style="italic">d &gt; 2</text>

  <!-- Right side: Text content -->

  <!-- Title -->
  <text x="720" y="210" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="60" font-weight="700" text-anchor="start">
    <tspan fill="#c1002a">red</tspan><tspan fill="#e2e8f0">2pack</tspan>
  </text>

  <!-- Separator -->
  <line x1="720" y1="230" x2="1200" y2="230" stroke="#334155" stroke-width="2"/>

  <!-- Subtitle -->
  <text x="720" y="270" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-style="italic" fill="#94a3b8" text-anchor="start">
    2-Packing Set Solver
  </text>

  <!-- Tagline -->
  <text x="720" y="330" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#cbd5e1" text-anchor="start">
    Scalable solver for the 2-packing set
  </text>
  <text x="720" y="356" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#cbd5e1" text-anchor="start">
    problem using data reduction
  </text>

  <!-- Badge: Part of KarlsruheMIS -->
  <rect x="720" y="390" width="240" height="36" rx="18" ry="18" fill="none" stroke="#059669" stroke-width="1.5" opacity="0.7"/>
  <text x="840" y="414" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#34d399" text-anchor="middle" opacity="0.9">
    Part of KarlsruheMIS
  </text>

  <!-- Legend -->
  <circle cx="735" cy="480" r="10" fill="#059669" stroke="#34d399" stroke-width="2"/>
  <text x="755" y="485" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="17" fill="#94a3b8">2-packing vertex</text>

  <circle cx="735" cy="520" r="10" fill="#2a3040" stroke="#4a5568" stroke-width="2"/>
  <text x="755" y="525" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="17" fill="#94a3b8">Excluded vertex</text>

</svg>